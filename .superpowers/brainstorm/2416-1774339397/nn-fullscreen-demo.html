<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NN Isometric — Full Screen Demo</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Inter', sans-serif;
    background: #fff;
    color: #1a1a1a;
    overflow: hidden;
    height: 100vh;
    cursor: pointer;
  }

  #nnBox {
    position: fixed;
    top: 0; left: 0;
    width: 100vw; height: 100vh;
    transform-style: preserve-3d;
  }

  .nn-node {
    position: absolute;
    width: 9px; height: 9px;
    border-radius: 50%;
    background: #a0a0a0;
    transform: translate(-50%, -50%);
    transition: background 0.35s, box-shadow 0.35s, transform 0.35s;
  }

  .nn-ghost { transition: none; }

  .nn-depth-layer {
    position: absolute; top: 0; left: 0; width: 100%; height: 100%;
    pointer-events: none;
  }

  .morph-label {
    position: fixed;
    top: 6vh; left: 10vw;
    font-size: 1.1rem; font-weight: 600;
    z-index: 100;
  }
  .morph-sublabel {
    position: fixed;
    top: calc(6vh + 1.8rem); left: 10vw;
    font-size: 0.85rem; color: #888;
    z-index: 100;
  }
  .hl { color: #fabb43; }

  /* Tokens on the left (mimicking nn-input layout) */
  .token-stack {
    position: fixed;
    left: 6vw; top: 50%;
    transform: translateY(-50%);
    display: flex;
    flex-direction: column;
    gap: 0.5rem;
    z-index: 50;
  }
  .token-pill {
    font-size: 1.4rem;
    font-weight: 500;
    padding: 0.3rem 0.7rem;
    border-radius: 8px;
    color: white;
  }
  .token-pill.grey { background: rgba(170,170,170,0.7); }
  .token-pill.blue { background: rgba(74,144,217,0.85); }
  .token-pill.orange { background: rgba(232,133,61,0.85); }

  .controls {
    position: fixed;
    bottom: 2rem; left: 50%; transform: translateX(-50%);
    z-index: 200;
    display: flex; gap: 0.5rem;
    font-family: 'Inter', sans-serif;
  }
  .ctrl-btn {
    padding: 0.5rem 1rem;
    border-radius: 8px;
    border: 1px solid #e0e0e0;
    background: white;
    font-size: 0.75rem;
    font-weight: 600;
    cursor: pointer;
    color: #555;
    transition: all 0.2s;
  }
  .ctrl-btn:hover { border-color: #fabb43; color: #fabb43; }
  .ctrl-btn.active { background: #fabb43; color: white; border-color: #fabb43; }
</style>
</head>
<body>

<div class="morph-label">Schritt 2: <span class="hl">Neuronales Netz</span></div>
<div class="morph-sublabel">Tokens fließen durch das Netz</div>

<div class="token-stack">
  <span class="token-pill grey">Der</span>
  <span class="token-pill blue">Patent</span>
  <span class="token-pill blue">anspruch</span>
  <span class="token-pill grey">betrifft</span>
  <span class="token-pill grey">eine</span>
  <span class="token-pill orange">Vorrichtung</span>
</div>

<div id="nnBox"></div>

<div class="controls">
  <button class="ctrl-btn active" onclick="setMode('bolt')">Bolt Animation</button>
  <button class="ctrl-btn" onclick="setMode('explode')">Explode (depth)</button>
</div>

<script>
const LAYERS = 5;
const LAYER_NODES = [5, 7, 9, 7, 5];
const box = document.getElementById('nnBox');
const W = window.innerWidth;
const H = window.innerHeight;

// Isometric 3/4 view: layers go left→right, each shifted down+right
const ISO_SHIFT_X = W * 0.13;   // horizontal spacing between layers
const ISO_SHIFT_Y = H * 0.065;  // downward shift per layer (creates the 3/4 angle)
const NODE_GAP = H * 0.045;     // vertical spacing within a layer

// Center the network (shifted right to leave room for tokens on left)
const centerX = W * 0.52;
const centerY = H * 0.40;

const nodes = [];
const edges = [];
const layerGroups = [];

// SVG for edges
const svg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
svg.style.cssText = 'position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;';
svg.setAttribute('viewBox', `0 0 ${W} ${H}`);
box.appendChild(svg);

// Build nodes
for (let l = 0; l < LAYERS; l++) {
  const count = LAYER_NODES[l];
  const lx = centerX + (l - 2) * ISO_SHIFT_X;
  const ly = centerY + (l - 2) * ISO_SHIFT_Y;
  const group = [];

  for (let n = 0; n < count; n++) {
    const x = lx;
    const y = ly + (n - (count - 1) / 2) * NODE_GAP;

    const dot = document.createElement('div');
    dot.className = 'nn-node';
    dot.style.left = x + 'px';
    dot.style.top = y + 'px';
    box.appendChild(dot);

    const idx = nodes.length;
    nodes.push({ el: dot, x, y, l, n });
    group.push(idx);
  }
  layerGroups.push(group);
}

// Build edges
for (let l = 0; l < LAYERS - 1; l++) {
  for (const i of layerGroups[l]) {
    for (const j of layerGroups[l + 1]) {
      const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
      line.setAttribute('x1', nodes[i].x);
      line.setAttribute('y1', nodes[i].y);
      line.setAttribute('x2', nodes[j].x);
      line.setAttribute('y2', nodes[j].y);
      line.setAttribute('stroke', 'rgba(0,0,0,0.06)');
      line.setAttribute('stroke-width', '0.7');
      line.style.transition = 'stroke 0.35s, stroke-width 0.35s';
      svg.appendChild(line);
      edges.push({ el: line, i, j });
    }
  }
}

// ===== BOLT =====
let animFrame = null;
let litItems = [];

function buildBoltPath() {
  const path = [];
  let lastY = H * 0.3 + Math.random() * H * 0.4;
  for (let l = 0; l < LAYERS; l++) {
    const layer = layerGroups[l];
    const count = 1 + Math.floor(Math.random() * 2);
    const sorted = [...layer].sort((a, b) =>
      Math.abs(nodes[a].y - lastY) - Math.abs(nodes[b].y - lastY)
    );
    const picked = sorted.slice(0, count);
    lastY = nodes[layer[Math.floor(Math.random() * layer.length)]].y;
    path.push(picked);
  }
  return path;
}

function lightNode(idx, ts) {
  const n = nodes[idx];
  n.el.style.background = '#fabb43';
  n.el.style.boxShadow = '0 0 10px rgba(250,187,67,0.5)';
  n.el.style.transform = 'translate(-50%,-50%) scale(1.5)';
  litItems.push({ idx, time: ts });
}

function fadeNode(idx) {
  const n = nodes[idx];
  n.el.style.background = '';
  n.el.style.boxShadow = '';
  n.el.style.transform = '';
  edges.forEach(e => {
    if (e.i === idx || e.j === idx) {
      e.el.setAttribute('stroke', 'rgba(0,0,0,0.06)');
      e.el.setAttribute('stroke-width', '0.7');
    }
  });
}

function resetAll() {
  stopBolt();
  nodes.forEach(n => { n.el.style.background = ''; n.el.style.boxShadow = ''; n.el.style.transform = ''; });
  edges.forEach(e => { e.el.setAttribute('stroke', 'rgba(0,0,0,0.06)'); e.el.setAttribute('stroke-width', '0.7'); });
}

function fireBolt() {
  stopBolt();
  litItems = [];
  let boltPath = buildBoltPath();
  let boltHead = -1, boltTimer = 0, lastTime = null;
  let pausing = false, pauseTimer = 0;
  const STEP_MS = 180, FADE_MS = 500, PAUSE_MS = 600;

  function tick(ts) {
    if (!lastTime) lastTime = ts;
    const dt = ts - lastTime;
    lastTime = ts;

    if (pausing) {
      pauseTimer += dt;
      for (let i = litItems.length - 1; i >= 0; i--) {
        if (ts - litItems[i].time > FADE_MS) { fadeNode(litItems[i].idx); litItems.splice(i, 1); }
      }
      if (pauseTimer > PAUSE_MS && litItems.length === 0) {
        pausing = false; pauseTimer = 0;
        resetAll();
        boltPath = buildBoltPath();
        boltHead = -1; boltTimer = 0; litItems = [];
      }
      animFrame = requestAnimationFrame(tick);
      return;
    }

    boltTimer += dt;
    while (boltTimer > STEP_MS && boltHead < LAYERS - 1) {
      boltTimer -= STEP_MS;
      boltHead++;
      const nodeIndices = boltPath[boltHead];
      const prevIndices = boltHead > 0 ? boltPath[boltHead - 1] : [];
      nodeIndices.forEach(idx => {
        lightNode(idx, ts);
        prevIndices.forEach(prevIdx => {
          edges.forEach(e => {
            if ((e.i === prevIdx && e.j === idx) || (e.i === idx && e.j === prevIdx)) {
              e.el.setAttribute('stroke', 'rgba(250,187,67,0.35)');
              e.el.setAttribute('stroke-width', '1.8');
            }
          });
        });
      });
    }

    for (let i = litItems.length - 1; i >= 0; i--) {
      if (ts - litItems[i].time > FADE_MS) { fadeNode(litItems[i].idx); litItems.splice(i, 1); }
    }

    if (boltHead >= LAYERS - 1 && boltTimer > STEP_MS) { pausing = true; pauseTimer = 0; }
    animFrame = requestAnimationFrame(tick);
  }
  animFrame = requestAnimationFrame(tick);
}

function stopBolt() {
  if (animFrame) { cancelAnimationFrame(animFrame); animFrame = null; }
}

// ===== EXPLODE =====
const depthLayers = [];

function explode(num) {
  for (let d = 0; d < num; d++) {
    const layer = document.createElement('div');
    layer.className = 'nn-depth-layer';

    const depthIdx = d + 1;
    const offsetX = depthIdx * ISO_SHIFT_X * 0.15;
    const offsetY = depthIdx * ISO_SHIFT_Y * 0.5;
    const opacity = Math.max(0.08, 0.45 - depthIdx * 0.07);

    layer.style.cssText = `
      position:absolute;top:0;left:0;width:100%;height:100%;
      pointer-events:none;
      transform: translate(${offsetX}px, ${offsetY}px);
      opacity: 0;
    `;

    const lSvg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
    lSvg.style.cssText = 'position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;';
    lSvg.setAttribute('viewBox', `0 0 ${W} ${H}`);
    for (const e of edges) {
      const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
      line.setAttribute('x1', nodes[e.i].x);
      line.setAttribute('y1', nodes[e.i].y);
      line.setAttribute('x2', nodes[e.j].x);
      line.setAttribute('y2', nodes[e.j].y);
      line.setAttribute('stroke', `rgba(0,0,0,${opacity * 0.35})`);
      line.setAttribute('stroke-width', '0.4');
      lSvg.appendChild(line);
    }
    layer.appendChild(lSvg);

    nodes.forEach(n => {
      const dot = document.createElement('div');
      dot.className = 'nn-node nn-ghost';
      dot.style.left = n.x + 'px';
      dot.style.top = n.y + 'px';
      dot.style.opacity = opacity;
      layer.appendChild(dot);
    });

    box.appendChild(layer);
    depthLayers.push(layer);

    gsap.to(layer, { opacity: 1, duration: 0.5, delay: d * 0.12, ease: 'power2.out' });
  }
}

function clearExplosion() {
  depthLayers.forEach(l => l.remove());
  depthLayers.length = 0;
}

// ===== MODE SWITCHING =====
let currentMode = 'bolt';

function setMode(mode) {
  document.querySelectorAll('.ctrl-btn').forEach(b => b.classList.remove('active'));
  event.target.classList.add('active');

  if (mode === 'bolt') {
    clearExplosion();
    resetAll();
    fireBolt();
  } else if (mode === 'explode') {
    stopBolt();
    resetAll();
    explode(5);
  }
  currentMode = mode;
}

// Start with bolt
fireBolt();
</script>
</body>
</html>
