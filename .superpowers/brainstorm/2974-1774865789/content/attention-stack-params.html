<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Attention Stack + Parameters</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
  :root { --accent: #fabb43; --font: 'Inter', -apple-system, sans-serif; }
  body {
    font-family: var(--font); background: #0a0a0a; color: #fff;
    overflow: hidden; height: 100vh; cursor: pointer; user-select: none;
  }

  .viewport { position: fixed; inset: 0; }

  .label-area {
    position: fixed; top: 6vh; left: 8vw; z-index: 50;
  }
  .s-label {
    font-size: 0.8rem; text-transform: uppercase; letter-spacing: 0.12em;
    color: rgba(250,187,67,0.7); font-weight: 600; margin-bottom: 0.4rem;
  }
  .s-heading {
    font-size: clamp(1.6rem, 3.5vw, 2.5rem); font-weight: 700; line-height: 1.15;
  }
  .s-sub { font-size: 0.9rem; color: rgba(255,255,255,0.4); margin-top: 0.3rem; }
  .hl { color: var(--accent); }

  /* === Attention layer (single) === */
  .att-layer {
    position: absolute;
    width: 75vw; height: 20vh;
    left: 12.5vw;
    will-change: transform, opacity;
  }
  .att-layer svg { width: 100%; height: 100%; }

  .att-tokens {
    position: absolute; bottom: 0; left: 0; right: 0;
    display: flex; justify-content: space-between;
  }
  .att-token {
    padding: 0.3rem 0.7rem; border-radius: 6px;
    font-size: 0.75rem; font-weight: 600; color: #fff;
  }
  .t-blue { background: rgba(74,144,217,0.8); }
  .t-purple { background: rgba(124,92,191,0.8); }
  .t-orange { background: rgba(232,133,61,0.8); }
  .t-teal { background: rgba(61,170,143,0.8); }
  .t-pink { background: rgba(217,74,110,0.8); }

  /* Layer index badge */
  .layer-badge {
    position: absolute; right: -3rem; top: 50%;
    transform: translateY(-50%);
    font-size: 0.6rem; font-weight: 700; color: rgba(255,255,255,0.2);
    text-transform: uppercase; letter-spacing: 0.1em;
  }

  /* === Parameter dials === */
  .param-overlay {
    position: absolute; inset: 0;
    pointer-events: none; opacity: 0;
    z-index: 40;
  }
  .param-dial {
    position: absolute;
    width: 28px; height: 28px;
    border-radius: 50%;
    border: 1.5px solid rgba(250,187,67,0.4);
    display: flex; align-items: center; justify-content: center;
    opacity: 0;
  }
  .param-dial-inner {
    width: 4px; height: 10px;
    background: var(--accent);
    border-radius: 2px;
    transform-origin: bottom center;
  }
  .param-number {
    position: absolute;
    font-size: 0.5rem; font-weight: 600;
    color: rgba(250,187,67,0.5);
    font-variant-numeric: tabular-nums;
    white-space: nowrap;
  }

  /* Big number */
  .big-number {
    position: fixed; bottom: 8vh; left: 8vw;
    font-size: clamp(2rem, 5vw, 3.5rem);
    font-weight: 300; color: rgba(255,255,255,0.15);
    letter-spacing: 0.03em;
    font-variant-numeric: tabular-nums;
    z-index: 50;
    opacity: 0;
  }

  .hint {
    position: fixed; bottom: 1.5rem; right: 2rem;
    font-size: 0.75rem; color: #444; z-index: 200;
  }
  .hint span { font-weight: 600; }
  .progress-bar {
    position: fixed; top: 0; left: 0; height: 3px;
    background: var(--accent); z-index: 200; width: 0%;
  }
</style>
</head>
<body>

<div class="progress-bar" id="progressBar"></div>

<div class="label-area" id="labelArea">
  <div class="s-label">Schritt 3: Attention</div>
  <div class="s-heading" id="heading">Attention — <span class="hl">Wörter beobachten einander</span></div>
  <div class="s-sub" id="subtext">Das Modell lernt, welche Wörter zusammengehören</div>
</div>

<div class="viewport" id="viewport">
  <!-- Primary attention layer (already visible) -->
  <div class="att-layer" id="layer0" style="top: 55%;">
    <svg viewBox="0 0 700 130" fill="none">
      <path d="M 130,110 Q 170,15 210,110" stroke="#e8853d" stroke-width="3" fill="none"/>
      <path d="M 45,110 Q 90,55 130,110" stroke="#fabb43" stroke-width="1.8" fill="none"/>
      <path d="M 340,110 Q 440,15 550,110" stroke="#fabb43" stroke-width="2.5" fill="none"/>
      <path d="M 440,110 Q 495,55 550,110" stroke="#fabb43" stroke-width="1.3" fill="none"/>
      <path d="M 210,110 Q 275,60 340,110" stroke="#fabb43" stroke-width="1" fill="none"/>
    </svg>
    <div class="att-tokens">
      <span class="att-token t-blue">Der</span>
      <span class="att-token t-purple">Patent</span>
      <span class="att-token t-orange">anspruch</span>
      <span class="att-token t-teal">betrifft</span>
      <span class="att-token t-pink">eine</span>
      <span class="att-token t-blue">Vorrichtung</span>
    </div>
    <div class="layer-badge">Layer 1</div>
  </div>
</div>

<!-- Stacked layers (hidden, created by JS) -->

<div class="param-overlay" id="paramOverlay"></div>

<div class="big-number" id="bigNumber">1.800.000.000.000</div>

<div class="hint">Click or press <span>→</span> to advance</div>

<script>
// Different arc patterns for each stacked layer
const ARC_PATTERNS = [
  // Layer 2: different connections
  [
    { d: 'M 45,110 Q 130,10 210,110', s: '#e8853d', w: 2.5 },
    { d: 'M 210,110 Q 310,30 440,110', s: '#fabb43', w: 2 },
    { d: 'M 130,110 Q 180,50 210,110', s: '#fabb43', w: 1.5 },
    { d: 'M 340,110 Q 400,65 440,110', s: '#fabb43', w: 1 },
    { d: 'M 440,110 Q 500,40 550,110', s: '#fabb43', w: 2.2 },
  ],
  // Layer 3
  [
    { d: 'M 130,110 Q 240,5 340,110', s: '#fabb43', w: 3 },
    { d: 'M 45,110 Q 90,60 130,110', s: '#fabb43', w: 1.2 },
    { d: 'M 210,110 Q 280,45 340,110', s: '#e8853d', w: 2 },
    { d: 'M 340,110 Q 445,20 550,110', s: '#fabb43', w: 1.8 },
  ],
  // Layer 4
  [
    { d: 'M 45,110 Q 200,0 340,110', s: '#fabb43', w: 2.5 },
    { d: 'M 130,110 Q 200,50 280,110', s: '#e8853d', w: 1.5 },
    { d: 'M 280,110 Q 420,15 550,110', s: '#fabb43', w: 2.8 },
    { d: 'M 440,110 Q 470,70 500,110', s: '#fabb43', w: 0.8 },
  ],
  // Layer 5
  [
    { d: 'M 210,110 Q 250,20 280,110', s: '#e8853d', w: 2.5 },
    { d: 'M 45,110 Q 150,15 280,110', s: '#fabb43', w: 1.5 },
    { d: 'M 340,110 Q 380,50 440,110', s: '#fabb43', w: 2 },
    { d: 'M 130,110 Q 340,5 550,110', s: '#fabb43', w: 1.2 },
  ],
  // Layer 6
  [
    { d: 'M 45,110 Q 100,40 210,110', s: '#fabb43', w: 1.8 },
    { d: 'M 210,110 Q 350,0 500,110', s: '#e8853d', w: 3 },
    { d: 'M 340,110 Q 380,60 440,110', s: '#fabb43', w: 1 },
    { d: 'M 130,110 Q 170,55 210,110', s: '#fabb43', w: 1.5 },
  ],
  // Layer 7
  [
    { d: 'M 130,110 Q 280,0 440,110', s: '#fabb43', w: 2.8 },
    { d: 'M 45,110 Q 70,55 130,110', s: '#fabb43', w: 1 },
    { d: 'M 340,110 Q 450,25 550,110', s: '#e8853d', w: 2 },
    { d: 'M 210,110 Q 260,50 340,110', s: '#fabb43', w: 1.5 },
  ],
  // Layer 8
  [
    { d: 'M 45,110 Q 300,0 550,110', s: '#fabb43', w: 2 },
    { d: 'M 130,110 Q 170,40 210,110', s: '#e8853d', w: 2.5 },
    { d: 'M 340,110 Q 390,55 440,110', s: '#fabb43', w: 1.8 },
  ],
];

const LAYER_COLORS = [
  'rgba(250,187,67,', // amber variants at decreasing opacity
  'rgba(232,133,61,',
  'rgba(250,187,67,',
  'rgba(200,160,80,',
  'rgba(250,187,67,',
  'rgba(232,133,61,',
  'rgba(250,187,67,',
];

let step = 0, busy = false;
const stackedLayers = [];

function advance() { if (busy) return; step++; run(step); }
document.addEventListener('click', advance);
document.addEventListener('keydown', (e) => {
  if (e.key === 'ArrowRight' || e.key === ' ' || e.key === 'Enter') { e.preventDefault(); advance(); }
});
function setProgress(p) { document.getElementById('progressBar').style.width = p + '%'; }

function run(s) {
  if (s === 1) stackLayers();
  else if (s === 2) showParams();
  else if (s === 3) shiftAttention();
}

// === Step 1: Stack attention layers — "Das passiert 96 Mal" ===
function stackLayers() {
  busy = true;

  const heading = document.getElementById('heading');
  const subtext = document.getElementById('subtext');
  const viewport = document.getElementById('viewport');
  const baseLayer = document.getElementById('layer0');

  const tl = gsap.timeline({ onComplete: () => { busy = false; } });

  // Update label
  tl.to(subtext, { opacity: 0, duration: 0.2 }, 0);
  tl.call(() => {
    heading.innerHTML = 'Das wiederholt sich <span class="hl">96 Mal</span>';
    subtext.textContent = 'Jede Schicht lernt andere Zusammenhänge';
  }, null, 0.2);
  tl.to(subtext, { opacity: 1, duration: 0.3 }, 0.3);

  // Shrink base layer and move up
  tl.to(baseLayer, {
    top: '68%', scale: 0.85, opacity: 0.6,
    duration: 0.6, ease: 'power2.inOut'
  }, 0.2);

  // Create and stack new layers above
  const numLayers = 7;
  const startY = 62; // percentage
  const spacing = 6;

  for (let i = 0; i < numLayers; i++) {
    const layer = document.createElement('div');
    layer.className = 'att-layer';
    layer.style.top = (startY - (i + 1) * spacing) + '%';

    const depthFactor = 1 - (i + 1) * 0.06;
    const opacityFactor = Math.max(0.15, 0.55 - i * 0.06);

    // SVG with unique arc pattern
    const arcs = ARC_PATTERNS[i];
    let svgContent = '<svg viewBox="0 0 700 130" fill="none">';
    arcs.forEach(a => {
      svgContent += `<path d="${a.d}" stroke="${a.s}" stroke-width="${a.w}" fill="none" opacity="${opacityFactor + 0.1}"/>`;
    });
    svgContent += '</svg>';
    layer.innerHTML = svgContent +
      `<div class="layer-badge">Layer ${i + 2}</div>`;

    viewport.appendChild(layer);
    stackedLayers.push(layer);

    // Animate in: fade + slide down from above
    gsap.set(layer, { opacity: 0, y: -30, scale: depthFactor });
    tl.to(layer, {
      opacity: opacityFactor, y: 0,
      duration: 0.35,
      ease: 'power2.out'
    }, 0.5 + i * 0.12);
  }

  // Add "..." indicator at top
  tl.call(() => {
    const dots = document.createElement('div');
    dots.id = 'moreDots';
    dots.style.cssText = `
      position: absolute; top: ${startY - (numLayers + 1) * spacing}%;
      left: 50%; transform: translateX(-50%);
      font-size: 1.5rem; color: rgba(255,255,255,0.15);
      letter-spacing: 0.3em;
    `;
    dots.textContent = '· · ·';
    viewport.appendChild(dots);
    gsap.from(dots, { opacity: 0, y: -10, duration: 0.3 });
  }, null, 0.5 + numLayers * 0.12 + 0.1);

  setProgress(33);
}

// === Step 2: Parameter reveal — dials + numbers appear on connections ===
function showParams() {
  busy = true;

  const heading = document.getElementById('heading');
  const subtext = document.getElementById('subtext');
  const overlay = document.getElementById('paramOverlay');
  const bigNum = document.getElementById('bigNumber');

  const tl = gsap.timeline({ onComplete: () => { busy = false; } });

  // Update label
  tl.to(subtext, { opacity: 0, duration: 0.2 }, 0);
  tl.call(() => {
    heading.innerHTML = '<span class="hl">Parameter</span> — die Regler des Netzes';
    subtext.textContent = 'Jede Verbindung hat eine Zahl. GPT-4 hat 1,8 Billionen davon.';
  }, null, 0.2);
  tl.to(subtext, { opacity: 1, duration: 0.3 }, 0.3);

  // Show param overlay
  tl.to(overlay, { opacity: 1, duration: 0.3 }, 0.3);

  // Scatter dials and numbers across the viewport (on the arcs)
  const positions = [
    { x: '20%', y: '30%' }, { x: '35%', y: '22%' }, { x: '55%', y: '35%' },
    { x: '70%', y: '25%' }, { x: '42%', y: '48%' }, { x: '25%', y: '55%' },
    { x: '60%', y: '52%' }, { x: '80%', y: '45%' }, { x: '15%', y: '42%' },
    { x: '48%', y: '62%' }, { x: '72%', y: '58%' }, { x: '32%', y: '68%' },
    { x: '85%', y: '35%' }, { x: '50%', y: '18%' }, { x: '38%', y: '40%' },
  ];

  positions.forEach((pos, i) => {
    const dial = document.createElement('div');
    dial.className = 'param-dial';
    dial.style.left = pos.x;
    dial.style.top = pos.y;

    const inner = document.createElement('div');
    inner.className = 'param-dial-inner';
    inner.style.transform = `rotate(${Math.random() * 360}deg)`;
    dial.appendChild(inner);
    overlay.appendChild(dial);

    const num = document.createElement('div');
    num.className = 'param-number';
    num.style.left = `calc(${pos.x} + 18px)`;
    num.style.top = `calc(${pos.y} + 8px)`;
    num.textContent = (Math.random() * 2 - 1).toFixed(4);
    overlay.appendChild(num);

    tl.to(dial, { opacity: 1, duration: 0.25 }, 0.5 + i * 0.06);
    tl.to(num, { opacity: 1, duration: 0.25 }, 0.55 + i * 0.06);
  });

  // Big number fades in
  tl.to(bigNum, { opacity: 1, duration: 0.8, ease: 'power2.out' }, 1.2);

  setProgress(66);
}

// === Step 3: Shift attention — tweak params, arcs rearrange ===
function shiftAttention() {
  busy = true;

  const heading = document.getElementById('heading');
  const subtext = document.getElementById('subtext');
  const overlay = document.getElementById('paramOverlay');

  const tl = gsap.timeline({ onComplete: () => { busy = false; } });

  // Update label
  tl.call(() => {
    subtext.textContent = 'Andere Parameter → andere Aufmerksamkeit';
  });

  // Spin all dials
  const dials = overlay.querySelectorAll('.param-dial-inner');
  const nums = overlay.querySelectorAll('.param-number');

  dials.forEach((d, i) => {
    tl.to(d, {
      rotation: '+=' + (120 + Math.random() * 240),
      duration: 0.6, ease: 'power2.inOut'
    }, 0.1 + i * 0.03);
  });

  // Update numbers
  tl.call(() => {
    nums.forEach(n => {
      n.textContent = (Math.random() * 2 - 1).toFixed(4);
    });
  }, null, 0.4);

  // Flash the arcs — briefly glow then settle into new pattern
  const allPaths = document.querySelectorAll('.att-layer path');
  tl.to(allPaths, {
    opacity: 0.1, duration: 0.3, ease: 'power2.in'
  }, 0.3);
  tl.to(allPaths, {
    opacity: 0.5, duration: 0.5, ease: 'power2.out',
    stagger: 0.02
  }, 0.7);

  setProgress(100);
}
</script>

</body>
</html>
