<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Context Size v2</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Inter', sans-serif; background: #fff; color: #1a1a1a; overflow: hidden; height: 100vh; cursor: pointer; -webkit-user-select: none; user-select: none; }

  /* Text wall — real readable text, newspaper style columns */
  .text-wall {
    position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
    padding: 2rem 3rem;
    column-count: 5; column-gap: 1.5rem;
    font-size: 6.5px; line-height: 1.45; color: rgba(0,0,0,0.18);
    z-index: 1; overflow: hidden;
    text-align: justify; hyphens: auto;
    opacity: 0;
  }

  /* The big center cutout — white box that text wraps around */
  .center-block {
    position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
    width: 520px; z-index: 10;
    text-align: center;
    background: white;
    padding: 2.5rem 3rem;
    box-shadow: 0 0 60px 40px white;
  }

  .model-name {
    font-size: 0.65rem; font-weight: 600; text-transform: uppercase;
    letter-spacing: 0.12em; color: #bbb; margin-bottom: 0.4rem;
  }
  .token-num {
    font-size: clamp(3.5rem, 8vw, 6rem); font-weight: 300;
    letter-spacing: -0.03em; line-height: 1; color: #1a1a1a;
  }
  .token-unit { font-size: 0.3em; color: #ccc; font-weight: 400; margin-left: 0.15em; vertical-align: 0.1em; }
  .word-line { font-size: 0.9rem; color: #aaa; margin-top: 0.4rem; }

  /* Examples — clean horizontal row below the number */
  .examples {
    display: flex; gap: 0; margin-top: 2rem;
    border-top: 1px solid #f0f0f0; padding-top: 1.5rem;
  }
  .ex {
    flex: 1; text-align: center; padding: 0 0.8rem;
    border-right: 1px solid #f0f0f0;
    opacity: 0;
  }
  .ex:last-child { border-right: none; }
  .ex-count { font-size: 1.8rem; font-weight: 600; color: #fabb43; line-height: 1; }
  .ex-x { font-size: 0.7rem; font-weight: 500; color: #ccc; }
  .ex-name { font-size: 0.68rem; font-weight: 600; color: #555; margin-top: 0.3rem; }
  .ex-words { font-size: 0.55rem; color: #bbb; margin-top: 0.1rem; }

  /* Model pills */
  .pills {
    position: fixed; top: 2rem; right: 3rem; display: flex; gap: 0.4rem; z-index: 100;
  }
  .pill {
    padding: 0.35rem 0.8rem; border-radius: 20px;
    font-size: 0.6rem; font-weight: 600;
    border: 1px solid #e8e8e8; background: white; color: #999;
    cursor: pointer; transition: all 0.3s;
  }
  .pill.active { background: #fabb43; border-color: #fabb43; color: white; }
  .pill:hover:not(.active) { border-color: #fabb43; color: #fabb43; }

  .label { position: fixed; top: 2rem; left: 3rem; z-index: 100; }
  .label .ol { font-size: 0.65rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.14em; color: #fabb43; }
  .label h2 { font-size: 1.3rem; font-weight: 600; margin-top: 0.2rem; }
  .label h2 .hl { color: #fabb43; }
</style>
</head>
<body>

<div class="label">
  <div class="ol">Kontext-Fenster</div>
  <h2>Wie viel passt <span class="hl">rein</span>?</h2>
</div>

<div class="pills">
  <div class="pill" data-m="gpt4o">GPT-4o</div>
  <div class="pill" data-m="sonnet">Sonnet 4.6</div>
  <div class="pill active" data-m="opus">Opus 4.6</div>
</div>

<div class="text-wall" id="wall"></div>

<div class="center-block" id="centerBlock">
  <div class="model-name" id="mName">Claude Opus 4.6</div>
  <div class="token-num" id="tNum">1.000.000<span class="token-unit">Tokens</span></div>
  <div class="word-line" id="wLine">≈ 750.000 Wörter</div>

  <div class="examples" id="exRow">
    <div class="ex" id="ex0">
      <div class="ex-count" id="ec0">18</div>
      <div class="ex-x">mal</div>
      <div class="ex-name">Titanic Drehbuch</div>
      <div class="ex-words">~40.000 Wörter</div>
    </div>
    <div class="ex" id="ex1">
      <div class="ex-count" id="ec1">75</div>
      <div class="ex-x">mal</div>
      <div class="ex-name">Patentanmeldung</div>
      <div class="ex-words">~10.000 Wörter</div>
    </div>
    <div class="ex" id="ex2">
      <div class="ex-count" id="ec2">~1</div>
      <div class="ex-x">mal</div>
      <div class="ex-name">Die Bibel</div>
      <div class="ex-words">~783.000 Wörter</div>
    </div>
    <div class="ex" id="ex3">
      <div class="ex-count" id="ec3">0.7</div>
      <div class="ex-x">mal</div>
      <div class="ex-name">Harry Potter 1–7</div>
      <div class="ex-words">~1.084.000 Wörter</div>
    </div>
  </div>
</div>

<script>
// Fill wall with real German legal/patent text
const legalText = `Der Patentanspruch 1 betrifft eine Vorrichtung zum drahtlosen Laden eines mobilen Endgeräts, umfassend eine Sendespule, die dazu eingerichtet ist, ein elektromagnetisches Wechselfeld zu erzeugen, eine Empfangsspule, die dazu eingerichtet ist, das elektromagnetische Wechselfeld aufzunehmen und in elektrische Energie umzuwandeln, sowie eine Steuereinheit, die dazu eingerichtet ist, eine adaptive Frequenzregelung basierend auf einer Echtzeitmessung der Kopplungseffizienz zwischen Sendespule und Empfangsspule durchzuführen. Die Erfindung betrifft insbesondere das technische Gebiet der induktiven Energieübertragung, wobei die Steuereinheit ferner dazu eingerichtet ist, eine Leistungsanpassung und eine Impedanzabstimmung in Abhängigkeit von der Position des mobilen Endgeräts relativ zur Sendespule durchzuführen. Gemäß einer bevorzugten Ausführungsform umfasst die Vorrichtung ferner einen Temperatursensor zur Überwachung der thermischen Belastung der Sendespule. Das Verfahren zur Herstellung eines Verbundwerkstoffs umfasst die Schritte des Bereitstellens eines ersten Materials und eines zweiten Materials, des Zusammenführens der Materialien unter Druck und Temperatur, und des Aushärtens des resultierenden Verbundes. Der Fachmann entnimmt der Druckschrift DE 10 2020 456 789 A1, dass eine ähnliche Vorrichtung bekannt ist, jedoch ohne die adaptive Frequenzregelung. Die Neuheit des Anspruchs 1 ergibt sich somit aus dem Merkmal der Echtzeitmessung der Kopplungseffizienz, welches in der Druckschrift nicht offenbart ist. Patentanspruch 2 betrifft ein Verfahren zum Betreiben der Vorrichtung nach Anspruch 1, wobei das Verfahren die Schritte umfasst: Detektieren eines mobilen Endgeräts im Ladebereich, Bestimmen der optimalen Ladefrequenz mittels der Steuereinheit, Einleiten des Ladevorgangs mit der bestimmten Frequenz, und kontinuierliches Anpassen der Frequenz basierend auf der gemessenen Kopplungseffizienz. `;

let fullText = '';
for (let i = 0; i < 120; i++) fullText += legalText;
document.getElementById('wall').textContent = fullText;

// Models
const models = {
  opus: { name: 'Claude Opus 4.6', tokens: '1.000.000', words: 750000, label: '≈ 750.000 Wörter' },
  sonnet: { name: 'Claude Sonnet 4.6', tokens: '200.000', words: 150000, label: '≈ 150.000 Wörter' },
  gpt4o: { name: 'GPT-4o', tokens: '128.000', words: 96000, label: '≈ 96.000 Wörter' },
};

const compWords = [40000, 10000, 783000, 1084000];

function fmt(n) {
  if (n >= 100) return Math.round(n).toString();
  if (n >= 10) return Math.round(n).toString();
  if (n >= 1) return n.toFixed(1).replace('.0', '');
  return n.toFixed(1);
}

function switchModel(key) {
  const m = models[key];
  document.querySelectorAll('.pill').forEach(p => p.classList.toggle('active', p.dataset.m === key));

  gsap.to('#mName', { opacity: 0, duration: 0.15, onComplete: () => {
    document.getElementById('mName').textContent = m.name;
    gsap.to('#mName', { opacity: 1, duration: 0.25 });
  }});
  gsap.to('#tNum', { opacity: 0, scale: 0.97, duration: 0.15, onComplete: () => {
    document.getElementById('tNum').innerHTML = m.tokens + '<span class="token-unit">Tokens</span>';
    gsap.to('#tNum', { opacity: 1, scale: 1, duration: 0.35, ease: 'back.out(1.3)' });
  }});
  gsap.to('#wLine', { opacity: 0, duration: 0.15, onComplete: () => {
    document.getElementById('wLine').textContent = m.label;
    gsap.to('#wLine', { opacity: 1, duration: 0.25 });
  }});

  compWords.forEach((cw, i) => {
    const fits = m.words / cw;
    const el = document.getElementById('ec' + i);
    gsap.to(el, { opacity: 0, y: -5, duration: 0.15, onComplete: () => {
      el.textContent = fits < 1 ? fmt(fits) : (fits > 1.5 ? fmt(fits) : '~' + fmt(fits));
      gsap.to(el, { opacity: 1, y: 0, duration: 0.25 });
    }});
  });
}

document.querySelectorAll('.pill').forEach(p => {
  p.addEventListener('click', e => { e.stopPropagation(); switchModel(p.dataset.m); });
});

// Steps
let step = -1;
function advance() {
  step++;
  if (step === 0) {
    gsap.to('#wall', { opacity: 1, duration: 2 });
    gsap.fromTo('#mName', { opacity: 0 }, { opacity: 1, duration: 0.5, delay: 0.5 });
    gsap.fromTo('#tNum', { opacity: 0, scale: 0.9 }, { opacity: 1, scale: 1, duration: 0.7, delay: 0.7, ease: 'back.out(1.3)' });
    gsap.fromTo('#wLine', { opacity: 0 }, { opacity: 1, duration: 0.5, delay: 1 });
  } else if (step === 1) {
    gsap.to('#ex0', { opacity: 1, duration: 0.4 });
    gsap.to('#ex1', { opacity: 1, duration: 0.4, delay: 0.1 });
    gsap.to('#ex2', { opacity: 1, duration: 0.4, delay: 0.2 });
    gsap.to('#ex3', { opacity: 1, duration: 0.4, delay: 0.3 });
  }
}

document.addEventListener('click', e => { if (!e.target.closest('.pills')) advance(); });
document.addEventListener('keydown', e => { if (e.key === 'ArrowRight' || e.key === ' ') { e.preventDefault(); advance(); }});

gsap.fromTo('.label .ol, .label h2', { opacity: 0, y: 10 }, { opacity: 1, y: 0, duration: 0.5, stagger: 0.1, delay: 0.2 });
advance();
</script>

</body>
</html>
