<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Teil 2 — Morph Flow</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Inter', sans-serif;
    background: #fff; color: #1a1a1a;
    overflow: hidden; height: 100vh;
    cursor: pointer;
    -webkit-user-select: none; user-select: none;
  }

  .progress { position: fixed; top: 0; left: 0; height: 4px; background: linear-gradient(135deg, #dc2626, #fabb43); z-index: 1000; transition: width 0.5s; }

  .label { position: fixed; top: 2.5rem; left: 3.5rem; z-index: 100; }
  .label .ol { font-size: 0.7rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.14em; color: #fabb43; opacity: 0; }
  .label .hl-text { font-size: 1.8rem; font-weight: 600; line-height: 1.25; opacity: 0; margin-top: 0.4rem; max-width: 500px; }
  .label .hl-text .hl { color: #fabb43; }
  .label .sub { font-size: 0.9rem; color: #999; margin-top: 0.4rem; opacity: 0; max-width: 420px; line-height: 1.5; }

  .stages { position: fixed; bottom: 1.5rem; left: 50%; transform: translateX(-50%); display: flex; gap: 8px; z-index: 100; }
  .pip { width: 8px; height: 8px; border-radius: 50%; background: #e0e0e0; transition: all 0.4s; }
  .pip.on { background: #fabb43; transform: scale(1.3); }
  .pip.done { background: #e5a530; }
  .hint { position: fixed; bottom: 1.5rem; right: 2rem; font-size: 0.65rem; color: #ccc; z-index: 100; }

  /* Center content area */
  #centerArea {
    position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
    z-index: 50; text-align: center; width: 90%; max-width: 700px;
  }

  /* Opener */
  #openerText h1 { font-size: 3rem; font-weight: 600; line-height: 1.15; opacity: 0; }
  #openerText h1 .hl { color: #dc2626; }
  #openerText .sub { font-size: 1.1rem; color: #999; margin-top: 0.8rem; opacity: 0; }

  /* Bars */
  .bar-container { width: 100%; max-width: 520px; margin: 0 auto; text-align: left; }
  .bar-row { display: flex; align-items: center; gap: 12px; margin-bottom: 8px; }
  .bar-word { width: 100px; text-align: right; font-size: 1rem; font-weight: 500; color: #555; }
  .bar-track { flex: 1; height: 26px; background: #f0f0f0; border-radius: 6px; overflow: hidden; position: relative; }
  .bar-fill { height: 100%; border-radius: 6px; transition: width 0.6s ease; position: absolute; left: 0; top: 0; }
  .bar-pct { width: 45px; font-size: 0.8rem; color: #aaa; text-align: right; font-variant-numeric: tabular-nums; }

  .temp-display {
    margin-bottom: 2rem; text-align: center;
  }
  .temp-label { font-size: 0.7rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.1em; color: #999; margin-bottom: 0.3rem; }
  .temp-value { font-size: 2.5rem; font-weight: 300; color: #1a1a1a; }
  .temp-desc { font-size: 0.8rem; color: #bbb; margin-top: 0.2rem; }

  .sentence-build {
    font-size: 1.5rem; font-weight: 500; color: #333;
    margin-bottom: 2rem; text-align: left; min-height: 2.5rem;
  }
  .sentence-build .done { color: #1a1a1a; }
  .sentence-build .new-token {
    color: #fabb43; display: inline-block;
    border-bottom: 2px solid #fabb43;
    padding-bottom: 1px;
  }
  .cursor { display: inline-block; width: 2px; height: 1.2em; background: #fabb43; vertical-align: text-bottom; margin-left: 2px; animation: blink 0.8s step-end infinite; }
  @keyframes blink { 50% { opacity: 0; } }

  /* Insight box */
  .insight {
    padding: 1rem 1.3rem; border-radius: 0 10px 10px 0;
    font-size: 0.9rem; line-height: 1.55; max-width: 520px;
    margin: 0 auto; text-align: left; opacity: 0;
  }
  .insight.warn { background: #fef2f2; border-left: 4px solid #dc2626; color: #991b1b; }
  .insight.amber { background: #fffbeb; border-left: 4px solid #fabb43; color: #92400e; }

  /* Halluc box */
  .halluc-box {
    background: #fafafa; border: 1px solid #eee; border-radius: 14px;
    padding: 1.8rem 2rem; text-align: left; position: relative;
    overflow: hidden; max-width: 620px; margin: 0 auto;
  }
  .halluc-text { font-size: 1rem; line-height: 1.8; color: #333; }
  .fake-underline { position: absolute; left: -2px; right: -2px; bottom: -1px; height: 3px; background: #dc2626; opacity: 0; border-radius: 2px; }
  .fake { position: relative; display: inline; }

  .reveal-list { margin-top: 1.5rem; display: flex; flex-direction: column; gap: 0.5rem; }
  .reveal-item { display: flex; align-items: center; gap: 0.6rem; font-size: 0.9rem; opacity: 0; }
  .r-icon { width: 26px; height: 26px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 0.8rem; font-weight: 700; flex-shrink: 0; }
  .r-icon.bad { background: rgba(220,38,38,0.08); color: #dc2626; }
  .r-icon.good { background: rgba(22,163,74,0.08); color: #16a34a; }

  .halluc-quote {
    margin-top: 1.8rem; font-size: 1.05rem; font-style: italic;
    color: #92400e; border-left: 3px solid #fabb43; padding-left: 1.1rem;
    line-height: 1.5; opacity: 0; text-align: left;
    max-width: 620px; margin-left: auto; margin-right: auto;
  }

  .glitch-overlay { position: absolute; top: 0; left: 0; right: 0; bottom: 0; pointer-events: none; opacity: 0; z-index: 5; }
  .g-bar { position: absolute; left: 0; right: 0; height: 3px; background: rgba(220,38,38,0.35); }

  /* Two columns */
  .two-cols { display: flex; gap: 3rem; text-align: left; max-width: 700px; margin: 0 auto; }
  .col { flex: 1; }
  .col-head { font-size: 0.65rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 0.8rem; padding-bottom: 0.5rem; border-bottom: 2px solid; }
  .col-head.g { color: #16a34a; border-color: #16a34a; }
  .col-head.r { color: #dc2626; border-color: #dc2626; }
  .col-item { display: flex; gap: 0.5rem; margin-bottom: 0.7rem; font-size: 0.9rem; color: #444; line-height: 1.4; opacity: 0; }
  .col-item .ci { font-weight: 700; flex-shrink: 0; margin-top: 1px; }
  .ci.g { color: #16a34a; }
  .ci.r { color: #dc2626; }

  /* Risk items */
  .risk-list { display: flex; flex-direction: column; gap: 0.8rem; max-width: 650px; margin: 0 auto; text-align: left; }
  .risk-item {
    display: flex; gap: 1rem; padding: 1rem 1.3rem;
    background: #fafafa; border: 1px solid #eee; border-radius: 12px; opacity: 0;
  }
  .risk-icon { width: 32px; height: 32px; border-radius: 8px; background: rgba(220,38,38,0.06); color: #dc2626; display: flex; align-items: center; justify-content: center; font-size: 1rem; flex-shrink: 0; }
  .risk-title { font-size: 0.9rem; font-weight: 600; }
  .risk-desc { font-size: 0.75rem; color: #888; margin-top: 0.15rem; line-height: 1.4; }
  .rule-box { margin-top: 1.5rem; padding: 0.9rem 1.2rem; background: rgba(22,163,74,0.04); border-left: 4px solid #16a34a; border-radius: 0 10px 10px 0; opacity: 0; max-width: 650px; margin-left: auto; margin-right: auto; text-align: left; }
  .rule-box strong { color: #16a34a; }
  .rule-box span { font-size: 0.9rem; color: #444; }
</style>
</head>
<body>

<div class="progress" id="progress"></div>

<div class="label">
  <div class="ol" id="lOl"></div>
  <div class="hl-text" id="lHl"></div>
  <div class="sub" id="lSub"></div>
</div>

<div id="centerArea"></div>

<div class="stages" id="stagesEl"></div>
<div class="hint">Klick / → zum Weiter</div>

<script>
const W = window.innerWidth, H = window.innerHeight;
const center = document.getElementById('centerArea');
let stage = -1;
const STAGES = 6;
let busy = false;

// Pips
const stagesEl = document.getElementById('stagesEl');
for (let i = 0; i < STAGES; i++) { const p = document.createElement('div'); p.className = 'pip'; p.id = 'pip'+i; stagesEl.appendChild(p); }
function updatePips() { for (let i = 0; i < STAGES; i++) document.getElementById('pip'+i).className = 'pip'+(i===stage?' on':i<stage?' done':''); }

function setLabel(ol, hl, sub) {
  const oE = document.getElementById('lOl'), hE = document.getElementById('lHl'), sE = document.getElementById('lSub');
  gsap.to([oE, hE, sE], { opacity: 0, y: -10, duration: 0.3, onComplete: () => {
    oE.textContent = ol; hE.innerHTML = hl; sE.textContent = sub||'';
    gsap.fromTo([oE, hE, sE], { opacity: 0, y: 20 }, { opacity: 1, y: 0, duration: 0.6, stagger: 0.1 });
  }});
}
function hideLabel() { gsap.to([document.getElementById('lOl'), document.getElementById('lHl'), document.getElementById('lSub')], { opacity: 0, duration: 0.3 }); }

function clearCenter() { return gsap.to(center, { opacity: 0, duration: 0.3, onComplete: () => { center.innerHTML = ''; gsap.set(center, { opacity: 1 }); }}); }

// ========================
// STAGE 0: Opener
// ========================
function doStage0() {
  center.innerHTML = `
    <div id="openerText">
      <h1>Was KI <span class="hl">nicht</span> kann</h1>
      <div class="sub">...und warum das unvermeidlich ist.</div>
    </div>
  `;
  gsap.to('#openerText h1', { opacity: 1, duration: 0.8, delay: 0.2 });
  gsap.to('#openerText .sub', { opacity: 1, duration: 0.6, delay: 0.7 });
}

// ========================
// STAGE 1: Temperature
// ========================
function doStage1() {
  clearCenter().then(() => {
    setLabel('Temperature', 'Der <span class="hl">Kreativitätsregler</span>', 'Erinnerst du dich an die Wahrscheinlichkeitsbalken? Es gibt einen Regler, der sie verändert.');

    const barsData = [
      { word: 'anspruch', color: 'linear-gradient(90deg,#fabb43,#ea580c)' },
      { word: 'inhaber', color: '#fabb43' },
      { word: 'schutz', color: '#fabb43' },
      { word: 'anwalt', color: '#e0d5c0' },
      { word: 'amt', color: '#e0d5c0' },
    ];

    // Temperature presets: [temp, desc, percentages[]]
    const presets = [
      { t: '0', desc: 'Deterministisch — immer #1', pcts: [100, 0, 0, 0, 0] },
      { t: '0.7', desc: 'Standard — balanciert', pcts: [34, 22, 18, 11, 7] },
      { t: '1.5', desc: 'Kreativ — riskanter', pcts: [22, 18, 17, 15, 12] },
      { t: '2.0', desc: 'Chaos — fast zufällig', pcts: [18, 16, 15, 14, 13] },
    ];
    let presetIdx = 0;

    center.innerHTML = `
      <div style="margin-bottom:1.5rem; font-size:1.3rem; color:#333; text-align:left; max-width:520px; margin-left:auto; margin-right:auto;">
        Der Patent<span class="cursor"></span>
      </div>
      <div class="temp-display">
        <div class="temp-label">Temperature</div>
        <div class="temp-value" id="tempVal">0</div>
        <div class="temp-desc" id="tempDesc">Deterministisch — immer #1</div>
      </div>
      <div class="bar-container" id="barContainer"></div>
      <div class="insight amber" id="tempInsight" style="margin-top:1.5rem;">
        ⚡ <strong>Selbst bei Temperature 0 sind Halluzinationen möglich!</strong> Denn auch das wahrscheinlichste Muster kann falsch sein. Warum? → Nächster Schritt.
      </div>
    `;

    const bc = document.getElementById('barContainer');
    barsData.forEach((b, i) => {
      const row = document.createElement('div');
      row.className = 'bar-row';
      row.innerHTML = `
        <div class="bar-word">${b.word}</div>
        <div class="bar-track"><div class="bar-fill" id="bf${i}" style="background:${b.color};width:0%;"></div></div>
        <div class="bar-pct" id="bp${i}">0%</div>
      `;
      bc.appendChild(row);
    });

    // Initial bars
    gsap.to(center, { opacity: 1, duration: 0.3 });
    setTimeout(() => applyPreset(0, true), 600);

    // Cycle through presets on a timer
    let cycleCount = 0;
    const cycleInterval = setInterval(() => {
      cycleCount++;
      presetIdx = (presetIdx + 1) % presets.length;
      applyPreset(presetIdx, false);
      if (cycleCount >= presets.length * 2 - 1) {
        clearInterval(cycleInterval);
        // Show insight after cycling
        gsap.to('#tempInsight', { opacity: 1, duration: 0.6, delay: 0.5 });
      }
    }, 2200);

    function applyPreset(idx, instant) {
      const p = presets[idx];
      const dur = instant ? 0.01 : 0.8;
      gsap.to('#tempVal', { duration: 0.3, onUpdate: function() {
        document.getElementById('tempVal').textContent = p.t;
      }});
      document.getElementById('tempDesc').textContent = p.desc;
      p.pcts.forEach((pct, i) => {
        gsap.to(`#bf${i}`, { width: pct * 1.8 + '%', duration: dur, ease: 'power2.out' });
        document.getElementById(`bp${i}`).textContent = pct + '%';
      });
    }
  });
}

// ========================
// STAGE 2: The Mechanism — Token-by-token hallucination
// ========================
function doStage2() {
  clearCenter().then(() => {
    setLabel('Der Mechanismus', '<span class="hl">Nicht TROTZ</span> sondern WEGEN', 'Schau zu, wie eine Halluzination Wort für Wort entsteht.');

    center.innerHTML = `
      <div class="sentence-build" id="sentBuild" style="opacity:0;"><span class="done"></span><span class="cursor"></span></div>
      <div class="bar-container" id="mechBars" style="opacity:0;"></div>
      <div class="insight warn" id="mechInsight" style="margin-top:2rem;">
        ⚠ <strong>Dieses Aktenzeichen wurde nicht nachgeschlagen.</strong> Es wurde GENERIERT — Token für Token, basierend auf Mustern. Das Modell hat kein Bücherregal. Es hat Muster.
      </div>
    `;

    // The sequence of tokens to generate
    const steps = [
      { prefix: '', generating: 'Gemäß', bars: [
        { w: 'Gemäß', p: 42 }, { w: 'Die', p: 28 }, { w: 'In', p: 15 }, { w: 'Laut', p: 8 }
      ], note: '' },
      { prefix: 'Gemäß ', generating: 'der', bars: [
        { w: 'der', p: 67 }, { w: 'einer', p: 18 }, { w: 'dem', p: 10 }
      ], note: '' },
      { prefix: 'Gemäß der ', generating: 'BGH-Entscheidung', bars: [
        { w: 'BGH-Entsch...', p: 38 }, { w: 'Recht...', p: 22 }, { w: 'Bundes...', p: 18 }
      ], note: '' },
      { prefix: 'Gemäß der BGH-Entscheidung ', generating: 'X', bars: [
        { w: 'X', p: 41, hl: true }, { w: 'I', p: 26 }, { w: 'V', p: 15 }, { w: 'II', p: 10 }
      ], note: '← Das MUSTER "X ZR" ist häufig' },
      { prefix: 'Gemäß der BGH-Entscheidung X ', generating: 'ZR', bars: [
        { w: 'ZR', p: 48, hl: true }, { w: 'ZB', p: 30 }, { w: 'ZA', p: 12 }
      ], note: '← Wieder: Muster, nicht Fakt' },
      { prefix: 'Gemäß der BGH-Entscheidung X ZR ', generating: '47/19', bars: [
        { w: '47/19', p: 4, hl: true }, { w: '23/18', p: 4 }, { w: '12/21', p: 3 }, { w: '118/17', p: 3 }
      ], note: '← Plausible Ziffern — KEINE davon nachgeschlagen!' },
    ];

    let stepIdx = 0;

    gsap.to('#sentBuild', { opacity: 1, duration: 0.4, delay: 0.5 });
    gsap.to('#mechBars', { opacity: 1, duration: 0.4, delay: 0.5 });

    setTimeout(() => playStep(), 1000);

    function playStep() {
      if (stepIdx >= steps.length) {
        // Final reveal
        gsap.to('#mechInsight', { opacity: 1, duration: 0.7, delay: 0.5 });
        return;
      }

      const s = steps[stepIdx];

      // Update sentence
      const sb = document.getElementById('sentBuild');
      sb.innerHTML = `<span class="done">${s.prefix}</span><span class="new-token">${s.generating}</span><span class="cursor"></span>`;

      // Build bars
      const bc = document.getElementById('mechBars');
      bc.innerHTML = '';
      if (s.note) {
        const noteEl = document.createElement('div');
        noteEl.style.cssText = 'font-size:0.75rem; color:#dc2626; font-weight:500; margin-bottom:0.6rem; text-align:right; opacity:0;';
        noteEl.className = 'step-note';
        noteEl.textContent = s.note;
        bc.appendChild(noteEl);
      }
      s.bars.forEach((b, i) => {
        const row = document.createElement('div');
        row.className = 'bar-row';
        row.style.opacity = '0';
        const maxW = Math.max(...s.bars.map(x => x.p));
        const barColor = b.hl ? 'linear-gradient(90deg,#dc2626,#ea580c)' : '#e0d5c0';
        const wordColor = b.hl ? '#dc2626' : '#555';
        const wordWeight = b.hl ? '700' : '500';
        row.innerHTML = `
          <div class="bar-word" style="color:${wordColor};font-weight:${wordWeight};">${b.w}</div>
          <div class="bar-track"><div class="bar-fill" style="background:${barColor};width:0%;"></div></div>
          <div class="bar-pct">${b.p}%</div>
        `;
        bc.appendChild(row);
      });

      // Animate
      const rows = bc.querySelectorAll('.bar-row');
      gsap.to(rows, { opacity: 1, duration: 0.3, stagger: 0.06, delay: 0.1 });
      s.bars.forEach((b, i) => {
        const fill = rows[i].querySelector('.bar-fill');
        gsap.to(fill, { width: Math.min(b.p * 2, 100) + '%', duration: 0.6, delay: 0.2 + i * 0.06, ease: 'power2.out' });
      });
      const noteEl = bc.querySelector('.step-note');
      if (noteEl) gsap.to(noteEl, { opacity: 1, duration: 0.4, delay: 0.7 });

      // Highlight chosen token in sentence
      gsap.fromTo('.new-token', { backgroundColor: 'rgba(250,187,67,0.15)' },
        { backgroundColor: 'rgba(250,187,67,0)', duration: 1, delay: 0.3 });

      stepIdx++;
      setTimeout(() => playStep(), 2500);
    }
  });
}

// ========================
// STAGE 3: Hallucination Reveal
// ========================
function doStage3() {
  clearCenter().then(() => {
    setLabel('Das Ergebnis', 'Überzeugend — aber <span class="hl">komplett erfunden</span>', '');

    center.innerHTML = `
      <div class="halluc-box" id="hBox" style="opacity:0;">
        <div class="glitch-overlay" id="gO">
          <div class="g-bar" style="top:15%;"></div>
          <div class="g-bar" style="top:42%;"></div>
          <div class="g-bar" style="top:68%;"></div>
          <div class="g-bar" style="top:85%;"></div>
        </div>
        <div class="halluc-text">
          „Gemäß der BGH-Entscheidung
          <span class="fake">X&nbsp;ZR&nbsp;47/19<span class="fake-underline" id="fu1"></span></span>
          vom
          <span class="fake">14.03.2021<span class="fake-underline" id="fu2"></span></span>
          wurde festgestellt, dass der Patentanspruch 1 durch die Druckschrift
          <span class="fake">DE&nbsp;10&nbsp;2019&nbsp;123&nbsp;456&nbsp;A1<span class="fake-underline" id="fu3"></span></span>
          neuheitsschädlich vorweggenommen wird."
        </div>
        <div class="reveal-list">
          <div class="reveal-item"><div class="r-icon bad">✗</div><span>Aktenzeichen — generiertes Muster, nicht nachgeschlagen</span></div>
          <div class="reveal-item"><div class="r-icon bad">✗</div><span>Datum — statistisch plausibel, aber erfunden</span></div>
          <div class="reveal-item"><div class="r-icon bad">✗</div><span>Druckschrift — sieht echt aus, existiert nicht</span></div>
          <div class="reveal-item"><div class="r-icon good">✓</div><span>Klingt absolut überzeugend</span></div>
        </div>
      </div>
      <div class="halluc-quote" id="hQuote">
        „Die KI halluziniert nicht TROTZ ihrer Funktionsweise — sondern WEGEN."
      </div>
    `;

    const tl = gsap.timeline({ delay: 0.5 });

    // Box fades in clean
    tl.to('#hBox', { opacity: 1, duration: 0.6 });

    // Let them read
    tl.to({}, { duration: 2.5 });

    // Glitch flashes
    tl.to('#gO', { opacity: 1, duration: 0.06 });
    tl.to('#gO', { opacity: 0, duration: 0.04 }, '+=0.05');
    tl.to('#gO', { opacity: 0.7, duration: 0.04 }, '+=0.08');
    tl.to('#gO', { opacity: 0, duration: 0.06 }, '+=0.03');
    tl.to('#gO', { opacity: 0.4, duration: 0.03 }, '+=0.12');
    tl.to('#gO', { opacity: 0, duration: 0.08 }, '+=0.02');

    // Red underlines
    tl.to('#fu1', { opacity: 1, duration: 0.3 }, '+=0.15');
    tl.to('#fu2', { opacity: 1, duration: 0.3 }, '+=0.08');
    tl.to('#fu3', { opacity: 1, duration: 0.3 }, '+=0.08');

    // Reveals
    const items = document.querySelectorAll('.reveal-item');
    tl.to(items[0], { opacity: 1, duration: 0.4 }, '+=0.25');
    tl.to(items[1], { opacity: 1, duration: 0.4 }, '+=0.12');
    tl.to(items[2], { opacity: 1, duration: 0.4 }, '+=0.12');
    tl.to(items[3], { opacity: 1, duration: 0.5 }, '+=0.35');

    // Quote
    tl.to('#hQuote', { opacity: 1, duration: 0.7 }, '+=0.5');
  });
}

// ========================
// STAGE 4: What we know / don't
// ========================
function doStage4() {
  clearCenter().then(() => {
    setLabel('Der Stand der Forschung', 'Was wir <span class="hl">wissen</span> — und was nicht', '');

    center.innerHTML = `
      <div class="two-cols">
        <div class="col">
          <div class="col-head g">Was wir wissen</div>
          <div class="col-item"><span class="ci g">✓</span><span>Architektur (Transformer)</span></div>
          <div class="col-item"><span class="ci g">✓</span><span>Trainingsdaten (grob)</span></div>
          <div class="col-item"><span class="ci g">✓</span><span>Wie Attention funktioniert</span></div>
          <div class="col-item"><span class="ci g">✓</span><span>Mathematische Grundlagen</span></div>
          <div class="col-item"><span class="ci g">✓</span><span>Warum Halluzinationen unvermeidlich sind</span></div>
        </div>
        <div class="col">
          <div class="col-head r">Was wir NICHT wissen</div>
          <div class="col-item"><span class="ci r">?</span><span>Warum bestimmte Fähigkeiten plötzlich entstehen</span></div>
          <div class="col-item"><span class="ci r">?</span><span>Was einzelne Neuronen genau tun</span></div>
          <div class="col-item"><span class="ci r">?</span><span>Ob echtes „Verstehen" stattfindet</span></div>
          <div class="col-item"><span class="ci r">?</span><span>Wo die Grenzen der Fähigkeiten liegen</span></div>
        </div>
      </div>
    `;

    const tl = gsap.timeline({ delay: 0.6 });
    const leftItems = document.querySelectorAll('.col:first-child .col-item');
    tl.to(leftItems, { opacity: 1, duration: 0.4, stagger: 0.12 });
    tl.to({}, { duration: 0.5 });
    const rightItems = document.querySelectorAll('.col:last-child .col-item');
    tl.to(rightItems, { opacity: 1, duration: 0.4, stagger: 0.12 });
  });
}

// ========================
// STAGE 5: Risks
// ========================
function doStage5() {
  clearCenter().then(() => {
    setLabel('Risiken für die Praxis', 'Wo es für Patentanwälte <span class="hl">gefährlich</span> wird', '');

    center.innerHTML = `
      <div class="risk-list">
        <div class="risk-item"><div class="risk-icon">⚠</div><div><div class="risk-title">Erfundene Rechtsprechung & Aktenzeichen</div><div class="risk-desc">KI generiert formal korrekte Aktenzeichen, die nicht existieren.</div></div></div>
        <div class="risk-item"><div class="risk-icon">⚠</div><div><div class="risk-title">Plausible aber falsche technische Beschreibungen</div><div class="risk-desc">Details klingen richtig, sind aber subtil falsch — besonders bei Randbereichen.</div></div></div>
        <div class="risk-item"><div class="risk-icon">⚠</div><div><div class="risk-title">Subtile Fehler in Anspruchsformulierungen</div><div class="risk-desc">Schutzbereich-Grenzen stimmen nicht, Merkmale fehlen oder sind ungenau.</div></div></div>
        <div class="risk-item"><div class="risk-icon">⚠</div><div><div class="risk-title">Falsche Sicherheit durch perfektes Fachdeutsch</div><div class="risk-desc">KI schreibt perfekt — das macht es schwerer, Fehler zu erkennen.</div></div></div>
      </div>
      <div class="rule-box" id="ruleBox"><strong>Regel #1:</strong> <span>KI-Output ist ein Entwurf, niemals ein Ergebnis. IMMER verifizieren.</span></div>
    `;

    const tl = gsap.timeline({ delay: 0.5 });
    const items = document.querySelectorAll('.risk-item');
    items.forEach((item, i) => {
      gsap.set(item, { opacity: 0, y: 15 });
      tl.to(item, { opacity: 1, y: 0, duration: 0.45 }, i * 0.18);
    });
    tl.to('#ruleBox', { opacity: 1, duration: 0.6 }, '+=0.4');
  });
}

// === CONTROLLER ===
const fns = [doStage0, doStage1, doStage2, doStage3, doStage4, doStage5];
const busyTimes = [1000, 12000, 16000, 8000, 4000, 3000];

function advance() {
  if (busy || stage >= STAGES - 1) return;
  busy = true;
  stage++;
  updatePips();
  document.getElementById('progress').style.width = ((stage + 1) / STAGES * 100) + '%';
  fns[stage]();
  setTimeout(() => busy = false, busyTimes[stage]);
}

document.addEventListener('click', (e) => { if (!e.target.closest('.stages')) advance(); });
document.addEventListener('keydown', (e) => {
  if (e.key === 'ArrowRight' || e.key === ' ' || e.key === 'Enter') { e.preventDefault(); advance(); }
});

advance();
</script>
