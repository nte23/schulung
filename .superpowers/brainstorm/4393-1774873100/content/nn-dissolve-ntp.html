<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NN Dissolve → NTP</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
  :root { --accent: #fabb43; --font: 'Inter', -apple-system, sans-serif; }
  body {
    font-family: var(--font); background: #fff; color: #1a1a1a;
    overflow: hidden; height: 100vh; cursor: pointer; user-select: none;
  }

  /* NN container */
  #nnContainer {
    position: fixed; inset: 0;
    display: flex; align-items: center; justify-content: center;
  }
  #nnCanvas {
    position: relative;
    width: 60vw; height: 60vh;
  }
  .nn-dot {
    position: absolute;
    width: 8px; height: 8px;
    border-radius: 50%;
    background: #1a1a1a;
    transform: translate(-50%, -50%);
    will-change: transform, opacity;
  }
  #nnCanvas svg {
    position: absolute; inset: 0; width: 100%; height: 100%;
    pointer-events: none;
  }
  .nn-edge {
    stroke: rgba(0,0,0,0.10);
    stroke-width: 0.7;
    will-change: opacity;
  }

  /* NN labels + stream tokens (simplified for demo) */
  .nn-label {
    position: fixed; top: 6vh; left: 10vw;
    font-size: 1.1rem; font-weight: 600;
  }
  .nn-sublabel {
    position: fixed; top: calc(6vh + 1.6rem); left: 10vw;
    font-size: 0.85rem; color: #888;
  }
  .hl { color: var(--accent); }

  .stream-token {
    position: fixed;
    font-size: 1rem; font-weight: 500;
    color: #888; font-variant-numeric: tabular-nums;
    will-change: transform, opacity;
  }

  /* NTP overlay — starts from center, grows */
  #ntpOverlay {
    position: fixed; inset: 0;
    display: flex; flex-direction: column;
    align-items: flex-start; justify-content: center;
    padding: 0 10vw;
    opacity: 0;
    transform: scale(0.85);
    pointer-events: none;
  }
  .ntp-label {
    font-size: 0.8rem; font-weight: 600;
    text-transform: uppercase; letter-spacing: 0.14em;
    color: var(--accent); margin-bottom: 0.5rem;
  }
  .ntp-heading {
    font-size: clamp(1.8rem, 4vw, 3rem);
    font-weight: 700; line-height: 1.15; margin-bottom: 1.5rem;
  }
  .ntp-sentence {
    font-size: 1.4rem; font-weight: 500; color: #333; margin-bottom: 1.5rem;
  }
  .ntp-cursor {
    display: inline-block; width: 2px; height: 1.1em;
    background: var(--accent); vertical-align: text-bottom;
    margin-left: 2px; animation: blink 0.8s step-end infinite;
  }
  @keyframes blink { 50% { opacity: 0; } }

  .ntp-bars { width: 100%; max-width: 550px; }
  .ntp-row { display: flex; align-items: center; gap: 12px; margin-bottom: 8px; }
  .ntp-word { width: 120px; text-align: right; font-size: 0.95rem; font-weight: 500; color: #555; }
  .ntp-track { flex: 1; height: 26px; background: #f0f0f0; border-radius: 6px; overflow: hidden; }
  .ntp-fill { height: 100%; border-radius: 6px; width: 0%; }
  .ntp-fill.top { background: linear-gradient(90deg, #fabb43, #ea580c); }
  .ntp-fill.mid { background: #fabb43; }
  .ntp-fill.low { background: #e0d5c0; }
  .ntp-pct { width: 45px; font-size: 0.8rem; color: #aaa; text-align: right; font-variant-numeric: tabular-nums; }

  .ntp-insight {
    max-width: 550px; padding: 1rem 1.3rem;
    background: #fffbeb; border-left: 4px solid var(--accent);
    border-radius: 0 10px 10px 0;
    font-size: 0.9rem; line-height: 1.55; color: #92400e;
    margin-top: 1.5rem; opacity: 0;
  }

  .hint {
    position: fixed; bottom: 1.5rem; right: 2rem;
    font-size: 0.75rem; color: #bbb; z-index: 200;
  }
  .hint span { font-weight: 600; }
</style>
</head>
<body>

<!-- NN View -->
<div id="nnContainer">
  <div class="nn-label">Schritt 2: <span class="hl">Neuronales Netz</span></div>
  <div class="nn-sublabel">Tokens fließen durch das Netz</div>
  <div id="nnCanvas"></div>
</div>

<!-- NTP View (hidden, grows from center) -->
<div id="ntpOverlay">
  <div class="ntp-label">Das Kernprinzip</div>
  <div class="ntp-heading">Das <span class="hl">wahrscheinlichste</span> nächste Wort</div>
  <div class="ntp-sentence">Der Patent<span class="ntp-cursor"></span></div>
  <div class="ntp-bars">
    <div class="ntp-row"><div class="ntp-word">anspruch</div><div class="ntp-track"><div class="ntp-fill top" id="f0"></div></div><div class="ntp-pct" id="p0"></div></div>
    <div class="ntp-row"><div class="ntp-word">inhaber</div><div class="ntp-track"><div class="ntp-fill mid" id="f1"></div></div><div class="ntp-pct" id="p1"></div></div>
    <div class="ntp-row"><div class="ntp-word">schutz</div><div class="ntp-track"><div class="ntp-fill mid" id="f2"></div></div><div class="ntp-pct" id="p2"></div></div>
    <div class="ntp-row"><div class="ntp-word">anwalt</div><div class="ntp-track"><div class="ntp-fill low" id="f3"></div></div><div class="ntp-pct" id="p3"></div></div>
    <div class="ntp-row"><div class="ntp-word">amt</div><div class="ntp-track"><div class="ntp-fill low" id="f4"></div></div><div class="ntp-pct" id="p4"></div></div>
  </div>
  <div class="ntp-insight" id="ntpInsight">
    Das Modell <strong>WEISS</strong> die Antwort nicht. Es sagt das wahrscheinlichste nächste Wort vorher — Wort für Wort.
  </div>
</div>

<div class="hint">Click or press <span>→</span> to advance</div>

<script>
// Build NN
const canvas = document.getElementById('nnCanvas');
const W = canvas.clientWidth, H = canvas.clientHeight;
const LAYERS = 8, BASE = 14;
const nodes = [], groups = [], edges = [];

// SVG for edges
const svg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
svg.setAttribute('viewBox', `0 0 ${W} ${H}`);
canvas.appendChild(svg);

for (let l = 0; l < LAYERS; l++) {
    const t = 1 - Math.abs(2 * l / (LAYERS - 1) - 1);
    const count = Math.round(4 + t * (BASE - 4));
    const x = W * 0.2 + (W * 0.6) * l / (LAYERS - 1);
    const group = [];
    for (let n = 0; n < count; n++) {
        const spacing = H * 0.62 / (count + 1);
        const y = H * 0.19 + (n + 1) * spacing;
        const dot = document.createElement('div');
        dot.className = 'nn-dot';
        dot.style.left = x + 'px';
        dot.style.top = y + 'px';
        canvas.appendChild(dot);
        nodes.push({ el: dot, x, y });
        group.push(nodes.length - 1);
    }
    groups.push(group);
}

for (let l = 0; l < LAYERS - 1; l++) {
    for (const i of groups[l]) {
        for (const j of groups[l + 1]) {
            const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
            line.setAttribute('x1', nodes[i].x);
            line.setAttribute('y1', nodes[i].y);
            line.setAttribute('x2', nodes[j].x);
            line.setAttribute('y2', nodes[j].y);
            line.setAttribute('class', 'nn-edge');
            svg.appendChild(line);
            edges.push(line);
        }
    }
}

// Simple streaming tokens (left side)
let streamInterval;
function startStream() {
    streamInterval = setInterval(() => {
        const tok = document.createElement('div');
        tok.className = 'stream-token';
        tok.textContent = Math.floor(Math.random() * 60000 + 1000);
        tok.style.left = '4vw';
        tok.style.top = (35 + Math.random() * 30) + 'vh';
        document.body.appendChild(tok);
        gsap.set(tok, { opacity: 0, x: -10 });
        gsap.to(tok, { opacity: 1, x: 0, duration: 0.2 });
        gsap.to(tok, { x: '25vw', opacity: 0, scale: 0.4, color: '#fabb43',
            duration: 0.8, delay: 0.25, ease: 'power2.in',
            onComplete: () => tok.remove()
        });
    }, 1200);
}
startStream();

// Steps
let step = 0, busy = false;
function advance() { if (busy) return; step++; run(step); }
document.addEventListener('click', advance);
document.addEventListener('keydown', (e) => {
    if (e.key === 'ArrowRight' || e.key === ' ' || e.key === 'Enter') { e.preventDefault(); advance(); }
});

function run(s) {
    if (s === 1) dissolveNN();
    else if (s === 2) showBars();
    else if (s === 3) showInsight();
}

function dissolveNN() {
    busy = true;
    clearInterval(streamInterval);

    const allEdges = edges;
    const allDots = nodes.map(n => n.el);
    const label = document.querySelector('.nn-label');
    const sublabel = document.querySelector('.nn-sublabel');
    const ntp = document.getElementById('ntpOverlay');

    const tl = gsap.timeline({ onComplete: () => { busy = false; } });

    // 1. Fade out labels + stop stream tokens
    tl.to([label, sublabel], { opacity: 0, duration: 0.3 }, 0);
    tl.to('.stream-token', { opacity: 0, duration: 0.2 }, 0);

    // 2. Edges dissolve — fade out with slight stagger (fast wave from center outward)
    const centerX = W / 2;
    const sortedEdges = [...allEdges].sort((a, b) => {
        const ax = (parseFloat(a.getAttribute('x1')) + parseFloat(a.getAttribute('x2'))) / 2;
        const bx = (parseFloat(b.getAttribute('x1')) + parseFloat(b.getAttribute('x2'))) / 2;
        return Math.abs(ax - centerX) - Math.abs(bx - centerX);
    });

    sortedEdges.forEach((edge, i) => {
        tl.to(edge, {
            opacity: 0, duration: 0.3
        }, 0.1 + i * 0.0008);
    });

    // 3. Dots fade out — stagger from edges inward (outer dots first)
    const centerY = H / 2;
    const sortedDots = [...allDots].sort((a, b) => {
        const ax = parseFloat(a.style.left), ay = parseFloat(a.style.top);
        const bx = parseFloat(b.style.left), by = parseFloat(b.style.top);
        const distA = Math.sqrt((ax - centerX) ** 2 + (ay - centerY) ** 2);
        const distB = Math.sqrt((bx - centerX) ** 2 + (by - centerY) ** 2);
        return distB - distA; // outer first
    });

    sortedDots.forEach((dot, i) => {
        tl.to(dot, {
            opacity: 0, scale: 0,
            duration: 0.4, ease: 'power2.in'
        }, 0.3 + i * 0.005);
    });

    // 4. NTP grows from center — starts while dots are still dissolving
    tl.to(ntp, {
        opacity: 1, scale: 1,
        duration: 0.8, ease: 'power2.out'
    }, 0.8);
}

const BAR_DATA = [
    { id: 'f0', pct: 'p0', w: 68, l: '34%' },
    { id: 'f1', pct: 'p1', w: 44, l: '22%' },
    { id: 'f2', pct: 'p2', w: 36, l: '18%' },
    { id: 'f3', pct: 'p3', w: 22, l: '11%' },
    { id: 'f4', pct: 'p4', w: 14, l: '7%' },
];

function showBars() {
    busy = true;
    const tl = gsap.timeline({ onComplete: () => { busy = false; } });
    BAR_DATA.forEach((d, i) => {
        tl.to('#' + d.id, { width: d.w + '%', duration: 0.8, ease: 'power2.out' }, 0.1 + i * 0.12);
        tl.call(() => { document.getElementById(d.pct).textContent = d.l; }, null, 0.5 + i * 0.12);
    });
}

function showInsight() {
    busy = true;
    gsap.to('#ntpInsight', { opacity: 1, duration: 0.6, ease: 'power2.out', onComplete: () => { busy = false; } });
}
</script>

</body>
</html>
